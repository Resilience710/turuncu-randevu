<!doctype html>
<html lang="tr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#F97316" />
    <title>Turuncu Randevu - Çevrimdışı</title>
    <style>
      body { margin: 0; min-height: 100vh; display: grid; place-items: center; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #fff7ed; color: #1e293b; }
      main { width: min(88vw, 420px); padding: 28px; border-radius: 28px; background: #fff; border: 1px solid #fed7aa; box-shadow: 0 20px 60px rgba(249, 115, 22, 0.14); text-align: center; }
      .icon { width: 72px; height: 72px; margin: 0 auto 18px; border-radius: 24px; background: #f97316; color: white; display: grid; place-items: center; font-size: 34px; font-weight: 900; }
      h1 { margin: 0 0 10px; font-size: 25px; }
      p { margin: 0; color: #64748b; line-height: 1.55; }
    </style>
  </head>
  <body>
    <main>
      <div class="icon">R</div>
      <h1>Şu an çevrimdışısınız</h1>
      <p>İnternet bağlantısı geldiğinde Turuncu Randevu tekrar randevu bilgilerini yükleyecek.</p>
    </main>
  </body>
</html>
