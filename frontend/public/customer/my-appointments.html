<!doctype html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <meta name="theme-color" content="#F97316" />
  <title>Randevularım — Turuncu Randevu</title>
  <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Turuncu Randevu" />
    <meta name="mobile-web-app-capable" content="yes" />
  <link rel="icon" type="image/svg+xml" href="/icons/pwa-icon.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <script>(function(){var t=localStorage.getItem('turuncu-theme')||((window.matchMedia&&matchMedia('(prefers-color-scheme: dark)').matches)?'dark':'light');document.documentElement.classList.toggle('dark',t==='dark');})();</script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="/js/shared/tailwind-config.js"></script>
  <link rel="stylesheet" href="/css/theme.css" />
</head>
<body>
  <main class="consumer-main">
    <div class="consumer-page" style="max-width:680px;">
      <h1 style="font-size:26px;font-weight:700;margin-bottom:18px;">Randevularım</h1>
      <div id="list" style="display:flex;flex-direction:column;gap:12px;" data-testid="appointments-list">
        <div class="skeleton" style="height:90px;border-radius:12px;"></div>
        <div class="skeleton" style="height:90px;border-radius:12px;"></div>
      </div>
    </div>
  </main>

  <script src="/js/shared/theme.js"></script>
  <script src="/js/shared/api.js"></script>
  <script src="/js/shared/auth.js"></script>
  <script src="/js/shared/toast.js"></script>
  <script src="/js/shared/topnav.js"></script>
  <script src="/js/shared/confirm-modal.js"></script>
  <script>
    if ('serviceWorker' in navigator) navigator.serviceWorker.register('/sw.js').catch(()=>{});
    const session = window.Auth.requireRole(['customer']);
    if (session) {
      window.TopNav.mount('appts');
      const listEl = document.getElementById('list');
      const STATUS = {
        booked:     { label:'Onaylandı',  cls:'badge-brand' },
        in_service: { label:'İşlemde',    cls:'badge-success' },
        done:       { label:'Tamamlandı', cls:'badge-muted' },
        cancelled:  { label:'İptal',      cls:'badge-danger' },
        no_show:    { label:'Gelmedi',    cls:'badge-danger' },
      };

      async function refresh() {
        try {
          const data = await window.API.get('/appointments');
          const appts = data.appointments || [];
          if (!appts.length) { listEl.innerHTML = '<div class="empty-state"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg><h3>Henüz randevun yok</h3><p><a href="/customer/businesses.html" style="color:var(--brand-strong);font-weight:600;">Keşfet</a>’ten ilk randevunu al.</p></div>'; return; }
          listEl.innerHTML = '';
          appts.forEach(a => {
            const st = STATUS[a.status] || STATUS.booked;
            const card = document.createElement('div');
            card.className = 'card card-pad';
            card.setAttribute('data-testid', `appointment-card-${a.id}`);
            card.innerHTML = `
              <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:10px;">
                <div>
                  <div class="muted tnum" style="font-size:13px;">${a.date} · ${a.time}</div>
                  <div style="font-weight:600;font-size:16px;margin-top:2px;">${a.service_name}</div>
                  <div class="muted" style="font-size:13px;">${a.business_name||''}${a.staff_name?' · '+a.staff_name:''}</div>
                </div>
                <span class="badge ${st.cls}">${st.label}</span>
              </div>
              ${a.status==='booked' ? `<button class="btn btn-danger btn-sm" style="margin-top:12px;" data-testid="cancel-${a.id}">İptal et</button>` : ''}`;
            const cb = card.querySelector('[data-testid^="cancel-"]');
            if (cb) cb.addEventListener('click', async () => {
              if(!(await window.confirmModal({title:'Randevuyu iptal et',message:'Bu randevuyu iptal etmek istediğine emin misin?',confirmText:'İptal et',cancelText:'Vazgeç',danger:true}))) return;
              try { await window.API.patch(`/appointments/${a.id}/cancel`, {reason:'Müşteri iptal etti'}); window.Toast.success('İptal edildi'); refresh(); }
              catch(e){ window.Toast.error(e.message); }
            });
            listEl.appendChild(card);
          });
        } catch(e){ window.Toast.error(e.message); }
      }
      refresh();
    }
  </script>
<script src="/js/shared/pwa-install.js"></script>
</body>
</html>
