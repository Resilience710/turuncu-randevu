<!doctype html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <meta name="theme-color" content="#F97316" />
  <title>Hesabım — Turuncu Randevu</title>
  <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Turuncu Randevu" />
    <meta name="mobile-web-app-capable" content="yes" />
  <link rel="icon" type="image/svg+xml" href="/icons/pwa-icon.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <script>(function(){var t=localStorage.getItem('turuncu-theme')||((window.matchMedia&&matchMedia('(prefers-color-scheme: dark)').matches)?'dark':'light');document.documentElement.classList.toggle('dark',t==='dark');})();</script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="/js/shared/tailwind-config.js"></script>
  <link rel="stylesheet" href="/css/theme.css" />
</head>
<body>
  <main class="consumer-main">
    <div class="consumer-page" style="max-width:560px;">
      <h1 style="font-size:26px;font-weight:700;margin-bottom:18px;">Hesabım</h1>
      <div class="card card-pad" data-testid="profile-card">
        <div style="display:flex;align-items:center;gap:14px;">
          <div class="tn-avatar" style="width:56px;height:56px;font-size:22px;" id="avatar">?</div>
          <div><div style="font-size:18px;font-weight:600;" id="u-name"></div><div class="muted" style="font-size:13px;">Müşteri</div></div>
        </div>
        <hr class="divider" style="margin:16px 0;" />
        <div style="display:grid;grid-template-columns:auto 1fr;gap:10px 18px;font-size:14px;">
          <span class="muted">Telefon</span><span data-testid="phone-masked" id="u-phone"></span>
          <span class="muted">Gmail</span><span id="u-gmail"></span>
        </div>
      </div>

      <div class="card card-pad" style="margin-top:16px;display:flex;align-items:center;justify-content:space-between;">
        <div><div style="font-weight:600;">Görünüm</div><div class="muted" style="font-size:13px;">Açık veya koyu tema</div></div>
        <div style="display:flex;gap:6px;background:var(--surface-2);padding:4px;border-radius:10px;">
          <button class="btn btn-sm" id="theme-light" data-testid="theme-light">Açık</button>
          <button class="btn btn-sm" id="theme-dark" data-testid="theme-dark">Koyu</button>
        </div>
      </div>

      <button class="btn btn-danger btn-block" style="margin-top:16px;" onclick="window.Auth.logout()" data-testid="logout-button">Çıkış yap</button>
    </div>
  </main>

  <script src="/js/shared/theme.js"></script>
  <script src="/js/shared/api.js"></script>
  <script src="/js/shared/auth.js"></script>
  <script src="/js/shared/toast.js"></script>
  <script src="/js/shared/topnav.js"></script>
  <script>
    if ('serviceWorker' in navigator) navigator.serviceWorker.register('/sw.js').catch(()=>{});
    const session = window.Auth.requireRole(['customer']);
    if (session) {
      window.TopNav.mount('account');
      const u = session.user;
      document.getElementById('avatar').textContent = (u.first_name||u.name||'?').charAt(0).toUpperCase();
      document.getElementById('u-name').textContent = u.name||'';
      document.getElementById('u-phone').textContent = u.phone_masked||'—';
      document.getElementById('u-gmail').textContent = u.gmail||'—';
      function paint(){ const d=window.Theme.isDark(); document.getElementById('theme-light').className='btn btn-sm '+(d?'btn-soft':'btn-brand'); document.getElementById('theme-dark').className='btn btn-sm '+(d?'btn-brand':'btn-soft'); }
      paint();
      document.getElementById('theme-light').addEventListener('click',()=>{window.Theme.set('light');paint();});
      document.getElementById('theme-dark').addEventListener('click',()=>{window.Theme.set('dark');paint();});
    }
  </script>
<script src="/js/shared/pwa-install.js"></script>
</body>
</html>
