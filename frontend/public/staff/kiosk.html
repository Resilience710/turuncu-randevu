<!doctype html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no" />
  <meta name="theme-color" content="#020617" />
  <title>Kiosk — Turuncu Randevu</title>
  <link rel="manifest" href="/manifest-kiosk.webmanifest" />
    <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Turuncu Randevu" />
    <meta name="mobile-web-app-capable" content="yes" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --brand:#F97316; --success:#22C55E; --danger:#F87171;
      --bg:#020617; --panel:#0F172A; --panel-2:#1E293B; --line:#1E293B;
      --text:#F8FAFC; --muted:#94A3B8; --faint:#64748B;
    }
    * { box-sizing:border-box; }
    html, body { margin:0; height:100%; background:var(--bg); color:var(--text); overflow:hidden;
      font-family:'Inter',system-ui,sans-serif; user-select:none; -webkit-user-select:none; touch-action:manipulation; }
    .kiosk { height:100vh; display:flex; flex-direction:column; }
    .k-head { display:flex; justify-content:space-between; align-items:center; padding:18px 28px; border-bottom:1px solid var(--line); }
    .k-name { font-size:22px; font-weight:700; }
    .k-station { font-size:14px; color:var(--muted); margin-top:2px; }
    .k-exit { background:var(--panel-2); color:var(--muted); border:1px solid var(--line); border-radius:9px; padding:9px 16px; font-size:13px; font-weight:600; cursor:pointer; font-family:inherit; }
    .k-exit:hover { color:var(--text); }
    .k-body { flex:1; display:flex; align-items:center; justify-content:center; padding:24px; }
    .k-card { max-width:760px; width:100%; background:var(--panel); border:1px solid var(--line); border-radius:28px; padding:52px; text-align:center; box-shadow:0 30px 80px -20px rgba(0,0,0,.7); }
    .k-tag { display:inline-block; font-size:13px; font-weight:600; letter-spacing:.08em; text-transform:uppercase; color:var(--faint); margin-bottom:14px; }
    .k-customer { font-size:64px; font-weight:700; line-height:1.05; margin:0 0 10px; letter-spacing:-.02em; }
    .k-service { font-size:28px; color:var(--brand); font-weight:600; margin:0 0 8px; }
    .k-meta { font-size:17px; color:var(--muted); margin:0 0 36px; font-variant-numeric:tabular-nums; }
    .k-btn { width:100%; padding:30px; border-radius:20px; border:none; font-size:30px; font-weight:700; color:#fff; cursor:pointer; min-height:116px; font-family:inherit; transition:filter .15s; }
    .k-btn:hover:not(:disabled) { filter:brightness(1.06); }
    .k-btn:disabled { opacity:.45; cursor:not-allowed; }
    .k-btn.start { background:var(--brand); }
    .k-btn.finish { background:var(--success); }
    .k-empty { font-size:30px; color:var(--muted); font-weight:500; }
    .k-empty .sub { font-size:16px; color:var(--faint); margin-top:10px; font-weight:400; }
    .k-foot { display:flex; justify-content:space-between; align-items:center; padding:12px 24px; font-size:13px; color:var(--faint); border-top:1px solid var(--line); }
    .k-banner { position:fixed; top:14px; left:50%; transform:translateX(-50%); background:var(--brand); color:#fff; padding:9px 18px; border-radius:999px; font-size:13px; font-weight:600; display:none; z-index:30; }

    .k-overlay { position:fixed; inset:0; background:rgba(2,6,23,.7); backdrop-filter:blur(3px); display:none; align-items:center; justify-content:center; z-index:40; padding:16px; }
    .k-overlay.open { display:flex; }
    .k-modal { background:var(--panel); border:1px solid var(--line); border-radius:20px; padding:28px; max-width:360px; width:100%; }
    .k-modal h3 { font-size:18px; font-weight:600; margin:0 0 6px; }
    .k-modal p { color:var(--muted); font-size:14px; margin:0 0 16px; }
    .k-input { width:100%; height:54px; background:var(--panel-2); border:1px solid var(--line); border-radius:11px; color:var(--text);
      text-align:center; font-size:24px; letter-spacing:10px; font-weight:700; font-family:inherit; }
    .k-input:focus { outline:none; border-color:var(--brand); }
    .k-modal-btn { width:100%; height:48px; border-radius:11px; border:none; font-size:15px; font-weight:600; cursor:pointer; font-family:inherit; margin-top:10px; }
    .k-modal-go { background:var(--brand); color:#fff; }
    .k-modal-cancel { background:transparent; color:var(--muted); }
  </style>
</head>
<body>
  <div class="kiosk">
    <div class="k-head">
      <div>
        <div class="k-name" data-testid="kiosk-staff-name">…</div>
        <div class="k-station" data-testid="kiosk-station-label"></div>
      </div>
      <button class="k-exit" id="exit-btn" data-testid="kiosk-exit-btn">Çıkış</button>
    </div>

    <div class="k-body">
      <div id="card" class="k-card">
        <p class="k-empty" data-testid="kiosk-empty-state">Sıradaki randevu bekleniyor<span class="sub" style="display:block;">Yeni randevu geldiğinde burada görünecek</span></p>
      </div>
    </div>

    <div class="k-foot">
      <span data-testid="last-update" id="last-update">—</span>
      <span id="conn-status">●</span>
    </div>
  </div>

  <div class="k-banner" data-testid="kiosk-wakelock-banner" id="wakelock-banner">Tam ekran için ekrana dokun</div>

  <div class="k-overlay" id="exit-modal">
    <div class="k-modal">
      <h3>Kiosk çıkışı</h3>
      <p>Şifrenin son 4 hanesini gir.</p>
      <input class="k-input" id="exit-pin" type="password" inputmode="numeric" maxlength="4" pattern="[0-9]{4}" data-testid="kiosk-exit-pin-input" />
      <button class="k-modal-btn k-modal-go" id="exit-confirm" data-testid="kiosk-exit-confirm">Çık</button>
      <button class="k-modal-btn k-modal-cancel" id="exit-cancel">İptal</button>
    </div>
  </div>

  <script src="/js/shared/api.js"></script>
  <script src="/js/shared/auth.js"></script>
  <script src="/js/shared/toast.js"></script>
  <script>
    const session = window.Auth.requireRole(['staff', 'owner']);
    if (!session) throw 0;
    if ('serviceWorker' in navigator) navigator.serviceWorker.register('/sw.js').catch(() => {});

    document.querySelector('[data-testid=kiosk-staff-name]').textContent = session.user.name;
    document.querySelector('[data-testid=kiosk-station-label]').textContent =
      `${session.business?.name || ''}${session.user.station ? ' · ' + session.user.station : ''}`;

    // Wake lock + fullscreen
    let wakeLock = null;
    async function requestKioskMode() {
      try { if (!document.fullscreenElement) await document.documentElement.requestFullscreen(); } catch {}
      try { if ('wakeLock' in navigator) { wakeLock = await navigator.wakeLock.request('screen'); wakeLock.addEventListener('release', () => wakeLock = null); } } catch {}
    }
    document.addEventListener('visibilitychange', async () => {
      if (document.visibilityState === 'visible' && !wakeLock) { try { if ('wakeLock' in navigator) wakeLock = await navigator.wakeLock.request('screen'); } catch {} }
    });
    const banner = document.getElementById('wakelock-banner');
    if (!document.fullscreenElement) {
      banner.style.display = 'block';
      const onTap = async () => { banner.style.display = 'none'; await requestKioskMode(); document.removeEventListener('click', onTap); document.removeEventListener('touchstart', onTap); };
      document.addEventListener('click', onTap); document.addEventListener('touchstart', onTap);
    }
    document.addEventListener('contextmenu', (e) => e.preventDefault());
    document.addEventListener('selectstart', (e) => e.preventDefault());
    history.pushState({ kiosk: true }, '');
    window.addEventListener('popstate', () => history.pushState({ kiosk: true }, ''));
    window.addEventListener('beforeunload', (e) => { e.preventDefault(); e.returnValue = ''; });

    // Exit PIN
    const exitModal = document.getElementById('exit-modal');
    document.getElementById('exit-btn').addEventListener('click', () => { exitModal.classList.add('open'); setTimeout(() => document.getElementById('exit-pin').focus(), 100); });
    document.getElementById('exit-cancel').addEventListener('click', () => exitModal.classList.remove('open'));
    document.getElementById('exit-confirm').addEventListener('click', () => {
      const pin = document.getElementById('exit-pin').value;
      if (/^[0-9]{4}$/.test(pin)) window.Auth.logout();
      else window.Toast.error('Geçersiz PIN');
    });

    // Randevu döngüsü
    const cardEl = document.getElementById('card');
    function render(appt) {
      if (!appt) { cardEl.innerHTML = '<p class="k-empty" data-testid="kiosk-empty-state">Sıradaki randevu bekleniyor<span class="sub" style="display:block;">Yeni randevu geldiğinde burada görünecek</span></p>'; return; }
      const inService = appt.status === 'in_service';
      cardEl.innerHTML = `
        <span class="k-tag" data-testid="kiosk-status-tag">${inService ? 'İşlemde' : 'Sırada'}</span>
        <p class="k-customer" data-testid="kiosk-customer-name">${appt.customer_name || '—'}</p>
        <p class="k-service" data-testid="kiosk-service-name">${appt.service_name}</p>
        <p class="k-meta">${appt.time}${appt.customer_phone_masked ? ' · ' + appt.customer_phone_masked : ''}</p>
        ${inService
          ? '<button class="k-btn finish" data-testid="kiosk-finish-button">İşlemi Bitir</button>'
          : '<button class="k-btn start" data-testid="kiosk-start-button">İşlemi Başlat</button>'}`;
      const btn = cardEl.querySelector('button.k-btn');
      btn.addEventListener('click', async () => {
        btn.disabled = true;
        try { if (inService) await window.API.post(`/appointments/${appt.id}/finish`); else await window.API.post(`/appointments/${appt.id}/start`); await refresh(); }
        catch (e) { window.Toast.error(e.message); btn.disabled = false; }
      });
    }

    async function refresh() {
      try {
        const data = await window.API.get('/appointments');
        const today = new Date().toISOString().slice(0, 10);
        const mine = (data.appointments || [])
          .filter(a => a.staff_id === session.user.id && a.date === today && (a.status === 'in_service' || a.status === 'booked'))
          .sort((a, b) => a.time < b.time ? -1 : 1);
        render(mine.find(a => a.status === 'in_service') || mine.find(a => a.status === 'booked') || null);
        document.getElementById('last-update').textContent = 'Son güncelleme ' + new Date().toLocaleTimeString('tr-TR');
        const c = document.getElementById('conn-status'); c.textContent = '● Bağlı'; c.style.color = 'var(--success)';
      } catch (e) {
        const c = document.getElementById('conn-status'); c.textContent = '● Bağlantı yok'; c.style.color = 'var(--danger)';
      }
    }
    refresh();
    setInterval(refresh, 5000);
  </script>
</body>
</html>
